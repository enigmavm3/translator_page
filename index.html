requestAnimationFrame(() => {
  // Tag all grid containers
  document.querySelectorAll('#root [style]').forEach(el => {

    if (s.gridTemplateColumns) {
      el.classList.add('rwd-grid');
      const cols = s.gridTemplateColumns;
      if (cols.includes('200px')) el.classList.add('rwd-sidebar');
      if (cols.includes('repeat(2')) el.classList.add('rwd-2col');
      if (cols.includes('repeat(3')) el.classList.add('rwd-3col');
      if (cols.includes('repeat(4')) el.classList.add('rwd-4col');
      if (cols.includes('auto')) el.classList.add('rwd-cta');
      if (cols.includes('2fr')) el.classList.add('rwd-footer');
    }
    // Tag large-padding sections
    if (s.padding && (s.padding.includes('96px') || s.padding.includes('120px') || s.padding.includes('48px 56px')))
      el.classList.add('rwd-bigpad');
    // Tag inner containers with 40px padding
    if (s.padding === '0 40px' || s.padding === '0px 40px')
      el.classList.add('rwd-inner');
  });
  // Tag blockquotes
  document.querySelectorAll('#root blockquote').forEach(el => el.classList.add('rwd-quote'));
});
